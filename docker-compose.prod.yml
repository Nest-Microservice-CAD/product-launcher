services:
  nats-server:
    image: nats:latest
    ports:
      - "4222:4222"

  client-gateway:
    build: 
      context: ./client-gateway
      dockerfile: dockerfile.prod
    image: southamerica-east1-docker.pkg.dev/microservicios-494715/image-registry/client-gateway
    ports:
      - "${CLIENT_GATEWAY_PORT}:${CLIENT_GATEWAY_PORT}"
    environment:
      - PORT=${CLIENT_GATEWAY_PORT}
      - NATS_SERVERS=nats://nats-server:4222

  auth-ms:
    build: 
      context: ./auth-ms
      dockerfile: dockerfile.prod
      args:
        - AUTH_DATABASE_URL=${AUTH_DATABASE_URL}
    image: southamerica-east1-docker.pkg.dev/microservicios-494715/image-registry/auth-ms
    environment:
      - PORT=${AUTH_PORT}
      - NATS_SERVERS=nats://nats-server:4222
      - AUTH_DATABASE_URL=${AUTH_DATABASE_URL}
      - DATABASE_URL=${AUTH_DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}

  products-ms:
    build: 
      context: ./products-ms
      dockerfile: dockerfile.prod
    image: southamerica-east1-docker.pkg.dev/microservicios-494715/image-registry/products-ms
    environment:
      - PORT=${PRODUCTS_PORT}
      - DATABASE_URL=${PRODUCTS_DATABASE_URL}
      - NATS_SERVERS=nats://nats-server:4222
  
  orders-ms:
    build: 
      context: ./orders-ms
      dockerfile: dockerfile.prod
      args:
        - ORDER_DATABASE_URL=${ORDER_DATABASE_URL}
    image: southamerica-east1-docker.pkg.dev/microservicios-494715/image-registry/orders-ms
    environment:
      - PORT=${ORDERS_PORT}
      - DATABASE_URL=${ORDER_DATABASE_URL}
      - NATS_SERVERS=nats://nats-server:4222

  payments-ms:
    build: 
      context: ./payments-ms
      dockerfile: dockerfile.prod
    image: southamerica-east1-docker.pkg.dev/microservicios-494715/image-registry/payments-ms
    environment:
      - PORT=${PAYMENT_MS_PORT}
      - NATS_SERVERS=nats://nats-server:4222
      - STRIPE_SECRET=${STRIPE_SECRET}
      - STRIPE_ENDPOINT_SECRET=${STRIPE_ENDPOINT_SECRET}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL}
